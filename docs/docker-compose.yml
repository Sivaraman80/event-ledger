version: '3.8'

services:
  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: account-service-app
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ledger-network

  event-gateway:
    build:
      context: ./event-gateway
      dockerfile: Dockerfile
    container_name: event-gateway-app
    ports:
      - "8081:8081"
    environment:
      - ACCOUNT-SERVICE_URL=http://account-service-app:8082
    depends_on:
      account-service:
        condition: service_healthy
    networks:
      - ledger-network

networks:
  ledger-network:
    driver: bridge
